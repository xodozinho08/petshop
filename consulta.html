<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agendar Consulta — Xodozinho Pet Shop</title>
<link rel="icon" href="logo.jpg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600;700&family=Nunito+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --roxo-escuro:#3B1655; --roxo:#4A1D6B; --roxo-suave:#7A4BA8;
  --ouro:#D4A93C; --ouro-claro:#E8C86A; --ouro-escuro:#A87F1F;
  --creme:#F7F1E3; --cinza:#EDE7F3; --verde:#2E9E5B; --vermelho:#C0392B;
}
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:'Nunito Sans',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1.2rem;
  background-color:var(--roxo);
  background-image:
    linear-gradient(135deg, rgba(255,255,255,.05) 25%, transparent 25%, transparent 50%, rgba(255,255,255,.05) 50%, rgba(255,255,255,.05) 75%, transparent 75%),
    linear-gradient(45deg, rgba(0,0,0,.10) 25%, transparent 25%, transparent 50%, rgba(0,0,0,.10) 50%, rgba(0,0,0,.10) 75%, transparent 75%);
  background-size:56px 56px;
}
.cartao{background:#fff;border-radius:22px;padding:2.2rem 1.8rem;width:100%;max-width:460px;box-shadow:0 20px 60px rgba(0,0,0,.4);border-top:5px solid var(--ouro)}
.cartao-logo{width:78px;height:78px;border-radius:50%;border:3px solid var(--ouro);margin:0 auto .5rem;display:block;object-fit:cover}
h1{font-family:'Dancing Script',cursive;font-size:2.4rem;color:var(--roxo);text-align:center;line-height:1}
.sub{letter-spacing:.25em;font-size:.68rem;color:var(--ouro-escuro);font-weight:800;text-align:center;margin:.3rem 0 1.2rem}
.dias-aviso{background:var(--creme);border-left:4px solid var(--ouro);border-radius:10px;padding:.8rem 1rem;font-size:.9rem;color:var(--roxo);margin-bottom:1.2rem}
.dias-aviso strong{display:block;margin-bottom:.2rem}
label{display:block;font-weight:800;font-size:.85rem;color:var(--roxo);margin-bottom:.9rem}
input{width:100%;margin-top:.3rem;padding:.7rem .9rem;border:1.5px solid var(--cinza);border-radius:10px;font-family:inherit;font-size:.95rem}
input:focus{outline:none;border-color:var(--roxo-suave)}
.erro-data{display:none;color:var(--vermelho);font-size:.82rem;font-weight:700;margin-top:.3rem}
.erro-data.visivel{display:block}
.btn{width:100%;padding:.9rem;border:none;border-radius:999px;font-weight:800;font-size:1rem;cursor:pointer;color:#fff;background:#25D366;box-shadow:0 6px 16px rgba(37,211,102,.4);transition:transform .2s;font-family:inherit}
.btn:hover{transform:translateY(-2px)}
.voltar{display:block;text-align:center;margin-top:1.1rem;color:var(--roxo-suave);font-size:.88rem;font-weight:700;text-decoration:none}
.voltar:hover{text-decoration:underline}
.nota{font-size:.78rem;color:#8a7a9e;text-align:center;margin-top:.9rem}

/* Calendário */
.calendario{border:1.5px solid var(--cinza);border-radius:14px;padding:.8rem;margin-top:.3rem;background:#fff}
.cal-topo{display:flex;align-items:center;justify-content:space-between;margin-bottom:.5rem}
.cal-mes{font-weight:800;color:var(--roxo);font-size:.95rem}
.cal-nav{border:none;background:var(--creme);color:var(--roxo);font-size:1.2rem;width:32px;height:32px;border-radius:8px;cursor:pointer;font-weight:800}
.cal-nav:disabled{opacity:.35;cursor:default}
.cal-grade{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;text-align:center}
.cal-cab span{font-size:.7rem;font-weight:800;color:#8a7a9e;padding:.2rem 0}
.cal-dia{border:none;background:var(--creme);color:var(--roxo);font-weight:800;border-radius:8px;padding:.45rem 0;cursor:pointer;font-family:inherit;font-size:.88rem}
.cal-dia:hover{background:var(--ouro-claro)}
.cal-sel{background:var(--roxo)!important;color:var(--ouro-claro)}
.cal-off{color:#cfc6da;padding:.45rem 0;font-size:.88rem}
.data-escolhida{font-size:.85rem;font-weight:800;color:var(--verde);margin-top:.4rem;display:none}
.data-escolhida.visivel{display:block}
</style>
</head>
<body>

<div class="cartao">
  <img src="logo.jpg" alt="Xodozinho" class="cartao-logo">
  <h1>Agendar Consulta</h1>
  <p class="sub">VETERINÁRIA — XODOZINHO PET SHOP</p>

  <div class="dias-aviso" id="diasAviso">
    <strong>&#128197; Dias de atendimento:</strong>
    <span id="diasTexto">consulte a disponibilidade</span>
    <span id="obsTexto"></span>
  </div>

  <form id="formAgendar">
    <label>Seu nome
      <input type="text" id="agNome" placeholder="ex: Maria" required>
    </label>
    <label>Nome do pet
      <input type="text" id="agPet" placeholder="ex: Totó (poodle)" required>
    </label>
    <label>Data desejada — só os dias com atendimento estão ativos:
      <div class="calendario" id="calConsulta"></div>
      <input type="hidden" id="agData" required>
      <span class="data-escolhida" id="dataEscolhida"></span>
      <span class="erro-data" id="erroData">Escolha uma data disponível no calendário. &#128062;</span>
    </label>
    <label>Horário desejado
      <select id="agHora" required>
        <option value="">Selecione...</option>
      </select>
    </label>
    <label>Motivo da consulta
      <input type="text" id="agMotivo" placeholder="ex: vacina, consulta de rotina...">
    </label>
    <button type="submit" class="btn">&#128172; Enviar pedido pelo WhatsApp</button>
  </form>

  <p class="nota">Seu pedido vai direto para o WhatsApp da veterinária, que confirma o horário conforme a agenda do dia.</p>
  <a class="voltar" href="index.html">&#8592; Voltar ao site</a>
</div>

<script src="config.js"></script>
<script src="agenda.js"></script>
<script>
// ===== Agendamento de consulta — Xodozinho Pet Shop =====
const VET_WHATS = '5511912576138';
const NOMES = { seg:'Segunda', ter:'Terça', qua:'Quarta', qui:'Quinta', sex:'Sexta', sab:'Sábado', dom:'Domingo' };

const cfg = (window.XODO_CONFIG && window.XODO_CONFIG.consulta) || {};
const dias = (cfg.dias && cfg.dias.length) ? cfg.dias : ['ter','qua','qui','sex'];
const horarios = (cfg.horarios && cfg.horarios.length) ? cfg.horarios : ['10:00','11:00','14:00','15:00'];
const obs = cfg.obs || '';

document.getElementById('diasTexto').textContent = dias.map(d => NOMES[d]).join(', ');
if (obs) document.getElementById('obsTexto').textContent = ' — ' + obs;

document.getElementById('agHora').innerHTML =
  '<option value="">Selecione...</option>' + horarios.map(x => `<option>${x}</option>`).join('');

const campoData = document.getElementById('agData');
criarCalendario('calConsulta', 'agData', () => dias);

campoData.addEventListener('change', () => {
  document.getElementById('erroData').classList.remove('visivel');
  const [a, m, d] = campoData.value.split('-');
  const el = document.getElementById('dataEscolhida');
  el.textContent = `\u2713 Data escolhida: ${d}/${m}/${a}`;
  el.classList.add('visivel');
});

document.getElementById('formAgendar').addEventListener('submit', (e) => {
  e.preventDefault();
  if (!campoData.value) {
    document.getElementById('erroData').classList.add('visivel');
    return;
  }
  const [a, m, d] = campoData.value.split('-');
  const texto =
    `\u{1F43E} *Pedido de consulta \u2014 Xodozinho Pet Shop*\n\n` +
    `Tutor: ${document.getElementById('agNome').value.trim()}\n` +
    `Pet: ${document.getElementById('agPet').value.trim()}\n` +
    `Data: ${d}/${m}/${a}\n` +
    `Hor\u00e1rio: ${document.getElementById('agHora').value}\n` +
    (document.getElementById('agMotivo').value.trim() ? `Motivo: ${document.getElementById('agMotivo').value.trim()}\n` : '') +
    `\nAguardo a confirma\u00e7\u00e3o! \u{1F49C}`;
  window.open(`https://wa.me/${VET_WHATS}?text=${encodeURIComponent(texto)}`, '_blank');
});
</script>
</body>
</html>
